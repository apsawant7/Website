function populateFilters() {
    const categorySet = new Set();
    const yearSet = new Set();
    items.forEach(item => {
        if (item.cat) categorySet.add(item.cat.trim());
        if (item.year) yearSet.add(item.year);
    });

    const catF = document.getElementById("categoryFilter");
    const yearF = document.getElementById("yearFilter");

    [...categorySet].sort().forEach(cat => {
        const opt = document.createElement("option");
        opt.value = cat; opt.textContent = cat;
        catF.appendChild(opt);
    });

    [...yearSet].sort((a,b)=>b-a).forEach(year => {
        const opt = document.createElement("option");
        opt.value = year; opt.textContent = year;
        yearF.appendChild(opt);
    });
}

function renderCards(data) {
    const grid = document.getElementById("cardGrid");
    grid.innerHTML = "";
    data.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";
        const titleHTML = item.link ? `<a href="${item.link}" target="_blank">${item.title}</a>` : item.title;
        card.innerHTML = `
            <div class="meta">
                <span>${item.cat}</span>
                <span>${item.year}</span>
            </div>
            <h3>${titleHTML}</h3>
            <div class="desc">${item.desc || "<em>" + (item.authors || "") + "</em>"}</div>
        `;
        grid.appendChild(card);
    });
}

function applyFilters() {
    const search = document.getElementById("search").value.toLowerCase();
    const cat = document.getElementById("categoryFilter").value;
    const year = document.getElementById("yearFilter").value;

    const filtered = items.filter(i => {
        const matchesSearch = i.title.toLowerCase().includes(search) || 
                              (i.desc && i.desc.toLowerCase().includes(search)) ||
                              (i.authors && i.authors.toLowerCase().includes(search));
        const matchesCat = cat ? i.cat === cat : true;
        const matchesYear = year ? i.year.toString() === year : true;
        return matchesSearch && matchesCat && matchesYear;
    });
    renderCards(filtered);
}

document.getElementById("search").addEventListener("input", applyFilters);
document.getElementById("categoryFilter").addEventListener("change", applyFilters);
document.getElementById("yearFilter").addEventListener("change", applyFilters);

populateFilters();
renderCards(items);
</script>

/* -----------------------------
   BUILD FILTER OPTIONS
--------------------------------*/
function populateFilters() {
    const categorySet = new Set();
    const yearSet = new Set();

    items.forEach(item => {
        if (item.cat) categorySet.add(item.cat.trim());
        if (item.year) yearSet.add(item.year);
    });

    const categoryFilter = document.getElementById("categoryFilter");
    const yearFilter = document.getElementById("yearFilter");

    // Populate Unique Categories (Alphabetical)
    [...categorySet].sort().forEach(cat => {
        const opt = document.createElement("option");
        opt.value = cat;
        opt.textContent = cat;
        categoryFilter.appendChild(opt);
    });

    // Populate Years (Descending)
    [...yearSet].sort((a,b)=>b-a).forEach(year => {
        const opt = document.createElement("option");
        opt.value = year;
        opt.textContent = year;
        yearFilter.appendChild(opt);
    });
}

/* -----------------------------
   RENDER CARDS
--------------------------------*/
function renderCards(data) {
    const grid = document.getElementById("cardGrid");
    grid.innerHTML = "";
    
    data.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";
        const titleHTML = item.link 
            ? `<a href="${item.link}" target="_blank">${item.title}</a>` 
            : item.title;

        card.innerHTML = `
            <h3>${titleHTML}</h3>
            <div class="meta">
                <strong>${item.cat}</strong> • ${item.year}<br>
                <em>${item.authors}</em>
            </div>
            <p>${item.desc || ""}</p>
        `;
        grid.appendChild(card);
    });
}

/* -----------------------------
   FILTER + SEARCH LOGIC
--------------------------------*/
function applyFilters() {
    const searchText = document.getElementById("search").value.toLowerCase();
    const category = document.getElementById("categoryFilter").value;
    const year = document.getElementById("yearFilter").value;

    const filtered = items.filter(item => {
        const matchesSearch = 
            item.title.toLowerCase().includes(searchText) || 
            item.authors.toLowerCase().includes(searchText) ||
            item.desc.toLowerCase().includes(searchText);
        const matchesCategory = category ? item.cat === category : true;
        const matchesYear = year ? item.year.toString() === year : true;
        return matchesSearch && matchesCategory && matchesYear;
    });

    renderCards(filtered);
}

document.getElementById("search").addEventListener("input", applyFilters);
document.getElementById("categoryFilter").addEventListener("change", applyFilters);
document.getElementById("yearFilter").addEventListener("change", applyFilters);

populateFilters();
renderCards(items);
</script>

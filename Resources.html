<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dr. Amit Sawant – Webpage</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">

<style>
    :root {
        --logo-blue: #003366;      /* Primary Navy from Logo */
        --logo-gold: #FFD700;      /* Primary Gold from Logo */
        --midnight-slate: #1B2631; /* Blue-based Neutral */
        --bg-subtle: #F8FAFC;      /* Light background */
        --text-dark: #2C3E50;      /* Softened dark text */
    }

    body {
        margin: 0;
        font-family: 'Plus Jakarta Sans', sans-serif;
        background: var(--bg-subtle);
        color: var(--text-dark);
        line-height: 1.6;
    }

    /* --- BRANDED TIGHTER BANNER --- */
    header {
        background: linear-gradient(135deg, #001f3f 0%, var(--logo-blue) 100%);
        color: white;
        padding: 12px 5%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 4px solid var(--logo-gold);
    }

    .brand-area {
        display: flex;
        align-items: center;
        gap: 15px;
    }

    .logo-container {
        background: white;
        padding: 4px;
        border-radius: 4px;
        display: flex;
        align-items: center;
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .logo-img {
        height: 40px;
        width: auto;
    }

    header h1 {
        margin: 0;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: -0.3px;
    }

    /* --- SLEEK NAV BAR --- */
    nav {
        background: var(--midnight-slate);
        padding: 0 5%;
        display: flex;
        justify-content: center;
        position: sticky;
        top: 0;
        z-index: 1000;
        box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    nav a {
        color: #ced4da;
        padding: 14px 20px;
        text-decoration: none;
        font-weight: 600;
        font-size: 13px;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 0.8px;
    }

    nav a:hover {
        color: var(--logo-gold);
        background: rgba(255, 255, 255, 0.05);
    }

    nav a.active {
        color: white;
        border-bottom: 3px solid var(--logo-gold);
    }

    /* --- CONTENT AREA --- */
    .container {
        max-width: 1000px;
        margin: 40px auto;
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    }

    h3 {
        color: var(--logo-blue);
        border-bottom: 2px solid #edf2f7;
        padding-bottom: 8px;
        margin-top: 35px;
        font-size: 22px;
    }

    ul {
        padding-left: 20px;
        list-style-type: square;
    }

    li {
        margin-bottom: 12px;
    }

    a {
        color: var(--logo-blue);
        text-decoration: none;
        font-weight: 600;
    }

    a:hover {
        text-decoration: underline;
    }

    /* --- SOCIAL MEDIA TABLE --- */
    table {
        width: 100%;
        margin-top: 20px;
        border-collapse: collapse;
    }

    td {
        padding: 10px;
        text-align: center;
    }

    img {
        max-width: 100%;
        height: auto;
        border-radius: 8px;
    }

    .social-link img {
        transition: transform 0.2s;
        border-radius: 4px;
    }

    .social-link img:hover {
        transform: scale(1.1);
    }

    footer {
        background: var(--midnight-slate);
        color: #a0aec0;
        padding: 40px 20px;
        text-align: center;
        font-size: 12px;
        border-top: 4px solid var(--logo-gold);
    }

    footer strong {
        color: white;
    }
</style>
</head>
<body>

    </div>
